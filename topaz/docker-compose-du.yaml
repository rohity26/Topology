services:  
  du0:
    container_name: srsdu0
    image: srsran:split_8_zmq
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    privileged: true
    cap_add:
      - SYS_NICE
      - CAP_SYS_PTRACE
      - NET_ADMIN  # <--- ADD THIS LINE
    volumes:
      - /dev/bus/usb/:/dev/bus/usb/
      - /usr/share/uhd/images:/usr/share/uhd/images
      - ./RAN/du_zmq.conf:/config/du.conf
      - ./RAN/du_entrypoint.sh:/tmp/entrypoint.sh
    networks:
      oran-intel:
        ipv4_address: 175.53.1.10
      telemetry-net:
        ipv4_address: 171.53.1.10
    # depends_on:
    #   - cu0
    #   - 5gc
    command: bash -c 'chmod +x /tmp/entrypoint.sh && /tmp/entrypoint.sh && srsdu -c /config/du.conf'
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 3G
        reservations:
          cpus: "3.0"
          memory: 3G

