# This configuration file example shows how to configure the srsRAN Project gNB to allow srsUE to connect to it. 
# This specific example uses ZMQ in place of a USRP for the RF-frontend, and creates an FDD cell with 10 MHz bandwidth. 
# To run the srsRAN Project gNB with this config, use the following command: 
#   sudo ./gnb -c gnb_zmq.yaml
gnb_id: 513
gnb_id_bit_length: 22
#gnb_cu_up_id: 1003

cu_cp:
  max_nof_dus: 4                         # Optional UINT. Maximum number of DU connections that the CU-CP may accept.
  max_nof_cu_ups: 4                      # Optional UINT. Maximum number of CU-UP connections that the CU-CP may accept.
  inactivity_timer: 7200
  request_pdu_session_timeout: 15000
  amf:
    addr: 175.53.1.2                 # The address or hostname of the AMF.
    port: 38412
    bind_addr: 175.53.10.3            # A local IP that the gNB binds to for traffic from the AMF.
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
  #inactivity_timer: 7200            # Sets the UE/PDU Session/DRB inactivity timer to 7200 seconds. Supported: [1 - 7200].
  f1ap:
      # procedure_timeout: 5000
      bind_addr: 175.53.1.15

cu_up:
  nru:
    bind_addr: 175.53.1.15

#cu_up:
